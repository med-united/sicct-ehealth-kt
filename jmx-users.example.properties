# eHealth-KT JMX management accounts (used with --jmx-remote-port / --jmx-users-file).
# Format:  user = password, ROLE[, ROLE...]
# Roles:   CT_ADMIN   -> full administration (pairing removal, clear, restart, factory reset).
#          CT_CONTROL -> operational: read state, list pairings, confirm pairing, enter PIN.
#          CT_ADMIN implicitly includes all CT_CONTROL rights.
#
# Change these credentials before use. Keep this file readable only by the terminal's service user.

admin    = change-me-admin,   CT_ADMIN
operator = change-me-operator, CT_CONTROL
